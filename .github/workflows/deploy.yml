# Deployment Pipeline for BlogifyAI — EC2 Phase 1
#
# Triggered automatically when CI's build-and-push job succeeds on main.
# The EC2 instance's IAM role (blogifyai-ec2-role) grants access to
# AWS Secrets Manager — no AWS credentials are stored in GitHub secrets.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   — iarpitchauhan
#   DOCKERHUB_TOKEN      — Docker Hub access token (read: pull on EC2 only)
#   EC2_HOST             — public IP or DNS of the EC2 instance
#   EC2_SSH_KEY          — private key PEM (no passphrase) for ubuntu@EC2_HOST
#   AWS_REGION           — ap-south-1
#   AWS_SECRET_NAME      — blogifyai/production

name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      IMAGE: iarpitchauhan/blogify-ai:${{ github.event.workflow_run.head_sha }}
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      DEPLOY_DIR: /home/ubuntu/blogifyai

    steps:
      # ── Checkout so scp-action has the files on the runner ──────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Copy only the config files the EC2 actually needs ───────────────────
      - name: Copy config files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/docker-compose.prod.yml,backend/nginx/,backend/monitoring/"
          target: "/home/ubuntu/blogifyai/"
          strip_components: 0
          overwrite: true

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,IMAGE_TAG,DEPLOY_DIR
          script: |
            set -euo pipefail

            echo "==> [1/6] Injecting secrets from AWS Secrets Manager..."
            aws secretsmanager get-secret-value \
              --secret-id "${{ secrets.AWS_SECRET_NAME }}" \
              --region "${{ secrets.AWS_REGION }}" \
              --query SecretString \
              --output text \
            | python3 -c "
            import sys, json
            for k, v in json.load(sys.stdin).items():
                print(f'{k}={v}')
            " > "${DEPLOY_DIR}/.env"
            chmod 600 "${DEPLOY_DIR}/.env"
            echo "IMAGE_TAG=${IMAGE_TAG}" >> "${DEPLOY_DIR}/.env"

            # Export all vars into the current shell so docker compose
            # interpolation and pg_isready both see them
            set -o allexport
            source "${DEPLOY_DIR}/.env"
            set +o allexport

            echo "==> [2/6] Starting postgres + redis containers..."
            docker compose \
              -f "${DEPLOY_DIR}/backend/docker-compose.prod.yml" \
              --env-file "${DEPLOY_DIR}/.env" \
              up -d postgres redis

            echo "==> [3/6] Waiting for postgres to be healthy..."
            RETRIES=0
            until docker compose \
              -f "${DEPLOY_DIR}/backend/docker-compose.prod.yml" \
              --env-file "${DEPLOY_DIR}/.env" \
              exec -T postgres pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}"; do
              RETRIES=$((RETRIES + 1))
              if [ "$RETRIES" -ge 12 ]; then
                echo "❌ Postgres never became ready after 60s — aborting."
                docker compose \
                  -f "${DEPLOY_DIR}/backend/docker-compose.prod.yml" \
                  --env-file "${DEPLOY_DIR}/.env" \
                  logs postgres
                exit 1
              fi
              echo "  postgres not ready, retrying in 5s... (${RETRIES}/12)"
              sleep 5
            done
            echo "  postgres is ready."

            echo "==> [4/6] Pulling new image..."
            docker pull "${IMAGE}"

            echo "==> [5/6] Running Alembic migrations..."
            docker run --rm \
              --env-file "${DEPLOY_DIR}/.env" \
              --network blogifyai_backend \
              "${IMAGE}" \
              alembic upgrade head

            echo "==> [6/6] Bringing up the full production stack with 3 worker replicas..."
            docker compose \
              -f "${DEPLOY_DIR}/backend/docker-compose.prod.yml" \
              --env-file "${DEPLOY_DIR}/.env" \
              up -d \
              --scale worker=3 \
              --force-recreate \
              --remove-orphans

            echo "==> Pruning old images..."
            docker image prune -f

            echo "✅ Deploy of ${IMAGE} complete."

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke-test health endpoint
        run: |
          sleep 15  # allow containers to settle
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://api.blogifyai.arpitdev.site/api/health || echo "000")
          echo "Health endpoint returned HTTP ${STATUS}"
          [ "${STATUS}" = "200" ] || (echo "❌ Health check failed" && exit 1)