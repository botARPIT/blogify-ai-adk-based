apiVersion: apps/v1
kind: Deployment
metadata:
  name: blogify-api
  labels:
    app: blogify-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blogify-api
  template:
    metadata:
      labels:
        app: blogify-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: blogify-api
          image: gcr.io/PROJECT_ID/blogify-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: blogify-config
                  key: environment
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blogify-secrets
                  key: google-api-key
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blogify-secrets
                  key: tavily-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blogify-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: blogify-config
                  key: redis-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: gcr-json-key
---
apiVersion: v1
kind: Service
metadata:
  name: blogify-api
  labels:
    app: blogify-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: blogify-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blogify-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blogify-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
